<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Red corner brackets — top-left and bottom-right.
       Same diagonal-bracket signature used on .glass-card pseudo-elements. -->
  <path d="M 4 4 H 18 M 4 4 V 18" stroke="#FF003A" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M 60 60 H 46 M 60 60 V 46" stroke="#FF003A" stroke-width="2.5" stroke-linecap="square"/>

  <!-- "A" letterform — heavy condensed wedge with crossbar.
       Single path with fill-rule="evenodd": outer A silhouette, inner triangle subtracts. -->
  <path fill="#FFFFFF" fill-rule="evenodd" d="
    M 32 10
    L 54 56
    L 42 56
    L 38.5 46
    L 25.5 46
    L 22 56
    L 10 56
    Z
    M 32 24
    L 36.5 38
    L 27.5 38
    Z
  "/>
</svg>

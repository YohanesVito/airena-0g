<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="#0b0b1a"/>

  <!-- Synthwave grid floor -->
  <g opacity="0.25">
    <line x1="0" y1="320" x2="400" y2="320" stroke="#00f0ff" stroke-width="0.8"/>
    <line x1="0" y1="340" x2="400" y2="340" stroke="#00f0ff" stroke-width="0.6"/>
    <line x1="0" y1="360" x2="400" y2="360" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="0" y1="380" x2="400" y2="380" stroke="#00f0ff" stroke-width="0.4"/>
    <line x1="200" y1="320" x2="-100" y2="400" stroke="#ff2d78" stroke-width="0.5"/>
    <line x1="200" y1="320" x2="60" y2="400" stroke="#ff2d78" stroke-width="0.5"/>
    <line x1="200" y1="320" x2="160" y2="400" stroke="#ff2d78" stroke-width="0.5"/>
    <line x1="200" y1="320" x2="240" y2="400" stroke="#ff2d78" stroke-width="0.5"/>
    <line x1="200" y1="320" x2="340" y2="400" stroke="#ff2d78" stroke-width="0.5"/>
    <line x1="200" y1="320" x2="500" y2="400" stroke="#ff2d78" stroke-width="0.5"/>
  </g>

  <!-- Stars -->
  <circle cx="60" cy="50" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="340" cy="40" r="1" fill="#00f0ff" opacity="0.8"/>
  <circle cx="120" cy="80" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="280" cy="90" r="1.2" fill="#ff2d78" opacity="0.7"/>
  <circle cx="200" cy="30" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="370" cy="120" r="0.8" fill="#ffffff" opacity="0.5"/>

  <!-- LEFT BOT (cyan) -->
  <g filter="url(#glowCyan)" transform="translate(40,80)">
    <line x1="60" y1="0" x2="60" y2="22" stroke="#00f0ff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="-4" r="4" fill="#00f0ff"/>
    <rect x="32" y="22" width="56" height="44" rx="6" fill="#0b0b1a" stroke="#00f0ff" stroke-width="3"/>
    <rect x="26" y="34" width="6" height="14" rx="1.5" fill="#00f0ff"/>
    <rect x="88" y="34" width="6" height="14" rx="1.5" fill="#00f0ff"/>
    <rect x="38" y="32" width="44" height="11" rx="1.5" fill="#0b0b1a" stroke="#00f0ff" stroke-width="1.5"/>
    <rect x="40" y="34" width="18" height="7" rx="0.5" fill="#00f0ff"/>
    <rect x="62" y="34" width="18" height="7" rx="0.5" fill="#00f0ff"/>
    <rect x="44" y="52" width="3" height="6" fill="#00f0ff"/>
    <rect x="50" y="52" width="3" height="6" fill="#00f0ff"/>
    <rect x="56" y="52" width="3" height="6" fill="#00f0ff"/>
    <rect x="62" y="52" width="3" height="6" fill="#00f0ff"/>
    <rect x="68" y="52" width="3" height="6" fill="#00f0ff"/>
    <rect x="34" y="73" width="52" height="52" rx="6" fill="#0b0b1a" stroke="#00f0ff" stroke-width="3"/>
    <circle cx="60" cy="99" r="9" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2"/>
    <circle cx="60" cy="99" r="4" fill="#00f0ff"/>
    <rect x="20" y="70" width="16" height="20" rx="3" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <rect x="86" y="72" width="14" height="20" rx="3" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <rect x="100" y="52" width="12" height="28" rx="2" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <rect x="94" y="36" width="22" height="22" rx="3" fill="#00f0ff"/>
    <rect x="98" y="40" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="98" y="46" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="98" y="52" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="14" y="90" width="12" height="26" rx="2" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <rect x="12" y="116" width="16" height="14" rx="2" fill="#00f0ff"/>
    <rect x="38" y="125" width="14" height="36" rx="2" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <rect x="68" y="125" width="14" height="36" rx="2" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <rect x="34" y="158" width="22" height="8" rx="1.5" fill="#00f0ff"/>
    <rect x="64" y="158" width="22" height="8" rx="1.5" fill="#00f0ff"/>
  </g>

  <!-- RIGHT BOT (pink) - mirrored -->
  <g filter="url(#glowPink)" transform="translate(360,80) scale(-1,1)">
    <line x1="60" y1="0" x2="60" y2="22" stroke="#ff2d78" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="-4" r="4" fill="#ff2d78"/>
    <rect x="32" y="22" width="56" height="44" rx="6" fill="#0b0b1a" stroke="#ff2d78" stroke-width="3"/>
    <rect x="26" y="34" width="6" height="14" rx="1.5" fill="#ff2d78"/>
    <rect x="88" y="34" width="6" height="14" rx="1.5" fill="#ff2d78"/>
    <rect x="38" y="32" width="44" height="11" rx="1.5" fill="#0b0b1a" stroke="#ff2d78" stroke-width="1.5"/>
    <rect x="40" y="34" width="18" height="7" rx="0.5" fill="#ff2d78"/>
    <rect x="62" y="34" width="18" height="7" rx="0.5" fill="#ff2d78"/>
    <rect x="44" y="52" width="3" height="6" fill="#ff2d78"/>
    <rect x="50" y="52" width="3" height="6" fill="#ff2d78"/>
    <rect x="56" y="52" width="3" height="6" fill="#ff2d78"/>
    <rect x="62" y="52" width="3" height="6" fill="#ff2d78"/>
    <rect x="68" y="52" width="3" height="6" fill="#ff2d78"/>
    <rect x="34" y="73" width="52" height="52" rx="6" fill="#0b0b1a" stroke="#ff2d78" stroke-width="3"/>
    <circle cx="60" cy="99" r="9" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2"/>
    <circle cx="60" cy="99" r="4" fill="#ff2d78"/>
    <rect x="20" y="70" width="16" height="20" rx="3" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="86" y="72" width="14" height="20" rx="3" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="100" y="52" width="12" height="28" rx="2" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="94" y="36" width="22" height="22" rx="3" fill="#ff2d78"/>
    <rect x="98" y="40" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="98" y="46" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="98" y="52" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="14" y="90" width="12" height="26" rx="2" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="12" y="116" width="16" height="14" rx="2" fill="#ff2d78"/>
    <rect x="38" y="125" width="14" height="36" rx="2" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="68" y="125" width="14" height="36" rx="2" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="34" y="158" width="22" height="8" rx="1.5" fill="#ff2d78"/>
    <rect x="64" y="158" width="22" height="8" rx="1.5" fill="#ff2d78"/>
  </g>

  <!-- CENTER: lightning bolt -->
  <g opacity="0.5">
    <circle cx="200" cy="200" r="58" fill="none" stroke="url(#sparkGrad)" stroke-width="1" stroke-dasharray="4 5"/>
    <circle cx="200" cy="200" r="76" fill="none" stroke="url(#sparkGrad)" stroke-width="0.5" stroke-dasharray="1 8"/>
  </g>
  <g filter="url(#glowYellow)">
    <path d="M 212 140 L 178 208 L 200 208 L 188 268 L 224 196 L 202 196 L 216 140 Z"
          fill="#ffe14d" stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <!-- AIRENA text below -->
  <g filter="url(#glowText)">
    <text x="200" y="350" text-anchor="middle"
          font-family="'Orbitron', 'Arial Black', sans-serif"
          font-size="32" font-weight="900"
          letter-spacing="8"
          fill="url(#textGrad)">AIRENA</text>
  </g>

  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ff2d78"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#ff2d78"/>
    </linearGradient>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowText" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>

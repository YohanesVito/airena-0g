<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Black canvas -->
  <rect width="400" height="400" fill="#050505"/>

  <!-- Faint wireframe grid — hairlines in the brand red, low opacity.
       Same visual signature as the body grid in globals.css. -->
  <g opacity="0.10">
    <path d="M 80 0 V 400 M 160 0 V 400 M 240 0 V 400 M 320 0 V 400" stroke="#FF003A" stroke-width="1"/>
    <path d="M 0 80 H 400 M 0 160 H 400 M 0 240 H 400 M 0 320 H 400" stroke="#FF003A" stroke-width="1"/>
  </g>

  <!-- Four-corner HUD bracket frame, same pattern as the .hud-frame class -->
  <path d="M 24 24 H 60 M 24 24 V 60"   stroke="#FF003A" stroke-width="3" stroke-linecap="square"/>
  <path d="M 376 24 H 340 M 376 24 V 60" stroke="#FF003A" stroke-width="3" stroke-linecap="square"/>
  <path d="M 24 376 H 60 M 24 376 V 340" stroke="#FF003A" stroke-width="3" stroke-linecap="square"/>
  <path d="M 376 376 H 340 M 376 376 V 340" stroke="#FF003A" stroke-width="3" stroke-linecap="square"/>

  <!-- Dashed top accent rule between the top corners -->
  <path d="M 70 24 H 330" stroke="#FF003A" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Chapter marker -->
  <text x="200" y="180" text-anchor="middle"
        font-family="'JetBrains Mono', 'Menlo', monospace"
        font-size="13" letter-spacing="3" fill="#6A6A70">/// AIRENA</text>

  <!-- AIRENA wordmark, color-split -->
  <text x="200" y="244" text-anchor="middle"
        font-family="'Anton', 'Arial Black', 'Impact', sans-serif"
        font-size="84" font-weight="400" letter-spacing="2">
    <tspan fill="#FF003A">AI</tspan><tspan fill="#FFFFFF">RENA</tspan>
  </text>

  <!-- Tagline -->
  <text x="200" y="278" text-anchor="middle"
        font-family="'JetBrains Mono', 'Menlo', monospace"
        font-size="11" letter-spacing="3" fill="#C8C8CD">AI · PREDICTION · BATTLE · ARENA</text>

  <!-- Bottom HUD readout: status left, accent label right -->
  <text x="60" y="370"
        font-family="'JetBrains Mono', 'Menlo', monospace"
        font-size="10" letter-spacing="2" fill="#6A6A70">// 0G MAINNET</text>
  <text x="340" y="370" text-anchor="end"
        font-family="'JetBrains Mono', 'Menlo', monospace"
        font-size="10" letter-spacing="2" fill="#FF003A">LIVE</text>
</svg>

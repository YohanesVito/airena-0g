<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <!-- ============ LEFT BOT (cyan) ============ -->
  <g filter="url(#glowCyan)">
    <!-- antenna -->
    <line x1="60" y1="22" x2="60" y2="44" stroke="#00f0ff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="18" r="4" fill="#00f0ff"/>
    <circle cx="60" cy="18" r="7" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.6"/>

    <!-- head -->
    <rect x="32" y="44" width="56" height="44" rx="6" fill="#0b0b1a" stroke="#00f0ff" stroke-width="3"/>
    <!-- side ear/sensors -->
    <rect x="26" y="56" width="6" height="14" rx="1.5" fill="#00f0ff"/>
    <rect x="88" y="56" width="6" height="14" rx="1.5" fill="#00f0ff"/>

    <!-- eye visor -->
    <rect x="38" y="54" width="44" height="11" rx="1.5" fill="#0b0b1a" stroke="#00f0ff" stroke-width="1.5"/>
    <rect x="40" y="56" width="18" height="7" rx="0.5" fill="#00f0ff"/>
    <rect x="62" y="56" width="18" height="7" rx="0.5" fill="#00f0ff"/>

    <!-- mouth grille -->
    <rect x="44" y="74" width="3" height="6" fill="#00f0ff"/>
    <rect x="50" y="74" width="3" height="6" fill="#00f0ff"/>
    <rect x="56" y="74" width="3" height="6" fill="#00f0ff"/>
    <rect x="62" y="74" width="3" height="6" fill="#00f0ff"/>
    <rect x="68" y="74" width="3" height="6" fill="#00f0ff"/>

    <!-- neck -->
    <rect x="52" y="89" width="16" height="6" fill="#00f0ff" fill-opacity="0.5" stroke="#00f0ff" stroke-width="1.5"/>

    <!-- torso -->
    <rect x="34" y="95" width="52" height="52" rx="6" fill="#0b0b1a" stroke="#00f0ff" stroke-width="3"/>
    <!-- chest core -->
    <circle cx="60" cy="121" r="9" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2"/>
    <circle cx="60" cy="121" r="4" fill="#00f0ff"/>
    <!-- chest panel lines -->
    <line x1="40" y1="105" x2="50" y2="105" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="70" y1="105" x2="80" y2="105" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="40" y1="138" x2="80" y2="138" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.5"/>

    <!-- shoulder pad left -->
    <rect x="20" y="92" width="16" height="20" rx="3" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>

    <!-- raised fist (right arm, reaching toward center) -->
    <rect x="86" y="94" width="14" height="20" rx="3" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <!-- forearm -->
    <rect x="100" y="74" width="12" height="28" rx="2" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <!-- fist -->
    <rect x="94" y="58" width="22" height="22" rx="3" fill="#00f0ff"/>
    <rect x="98" y="62" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="98" y="68" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="98" y="74" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>

    <!-- left arm (down/back) -->
    <rect x="14" y="112" width="12" height="26" rx="2" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <rect x="12" y="138" width="16" height="14" rx="2" fill="#00f0ff"/>

    <!-- legs -->
    <rect x="38" y="147" width="14" height="36" rx="2" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <rect x="68" y="147" width="14" height="36" rx="2" fill="#0b0b1a" stroke="#00f0ff" stroke-width="2.5"/>
    <!-- feet -->
    <rect x="34" y="180" width="22" height="8" rx="1.5" fill="#00f0ff"/>
    <rect x="64" y="180" width="22" height="8" rx="1.5" fill="#00f0ff"/>

    <!-- knee accents -->
    <rect x="40" y="162" width="10" height="3" fill="#00f0ff" fill-opacity="0.7"/>
    <rect x="70" y="162" width="10" height="3" fill="#00f0ff" fill-opacity="0.7"/>
  </g>

  <!-- ============ RIGHT BOT (pink) — mirrored ============ -->
  <g filter="url(#glowPink)" transform="translate(600,0) scale(-1,1)">
    <line x1="60" y1="22" x2="60" y2="44" stroke="#ff2d78" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="18" r="4" fill="#ff2d78"/>
    <circle cx="60" cy="18" r="7" fill="none" stroke="#ff2d78" stroke-width="1" stroke-opacity="0.6"/>

    <rect x="32" y="44" width="56" height="44" rx="6" fill="#0b0b1a" stroke="#ff2d78" stroke-width="3"/>
    <rect x="26" y="56" width="6" height="14" rx="1.5" fill="#ff2d78"/>
    <rect x="88" y="56" width="6" height="14" rx="1.5" fill="#ff2d78"/>

    <rect x="38" y="54" width="44" height="11" rx="1.5" fill="#0b0b1a" stroke="#ff2d78" stroke-width="1.5"/>
    <rect x="40" y="56" width="18" height="7" rx="0.5" fill="#ff2d78"/>
    <rect x="62" y="56" width="18" height="7" rx="0.5" fill="#ff2d78"/>

    <rect x="44" y="74" width="3" height="6" fill="#ff2d78"/>
    <rect x="50" y="74" width="3" height="6" fill="#ff2d78"/>
    <rect x="56" y="74" width="3" height="6" fill="#ff2d78"/>
    <rect x="62" y="74" width="3" height="6" fill="#ff2d78"/>
    <rect x="68" y="74" width="3" height="6" fill="#ff2d78"/>

    <rect x="52" y="89" width="16" height="6" fill="#ff2d78" fill-opacity="0.5" stroke="#ff2d78" stroke-width="1.5"/>

    <rect x="34" y="95" width="52" height="52" rx="6" fill="#0b0b1a" stroke="#ff2d78" stroke-width="3"/>
    <circle cx="60" cy="121" r="9" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2"/>
    <circle cx="60" cy="121" r="4" fill="#ff2d78"/>
    <line x1="40" y1="105" x2="50" y2="105" stroke="#ff2d78" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="70" y1="105" x2="80" y2="105" stroke="#ff2d78" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="40" y1="138" x2="80" y2="138" stroke="#ff2d78" stroke-width="1" stroke-opacity="0.5"/>

    <rect x="20" y="92" width="16" height="20" rx="3" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>

    <rect x="86" y="94" width="14" height="20" rx="3" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="100" y="74" width="12" height="28" rx="2" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="94" y="58" width="22" height="22" rx="3" fill="#ff2d78"/>
    <rect x="98" y="62" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="98" y="68" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>
    <rect x="98" y="74" width="14" height="3" fill="#0b0b1a" fill-opacity="0.4"/>

    <rect x="14" y="112" width="12" height="26" rx="2" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="12" y="138" width="16" height="14" rx="2" fill="#ff2d78"/>

    <rect x="38" y="147" width="14" height="36" rx="2" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="68" y="147" width="14" height="36" rx="2" fill="#0b0b1a" stroke="#ff2d78" stroke-width="2.5"/>
    <rect x="34" y="180" width="22" height="8" rx="1.5" fill="#ff2d78"/>
    <rect x="64" y="180" width="22" height="8" rx="1.5" fill="#ff2d78"/>

    <rect x="40" y="162" width="10" height="3" fill="#ff2d78" fill-opacity="0.7"/>
    <rect x="70" y="162" width="10" height="3" fill="#ff2d78" fill-opacity="0.7"/>
  </g>

  <!-- ============ CENTER: VS / LIGHTNING / TEXT ============ -->

  <!-- Energy spark ring -->
  <g opacity="0.7">
    <circle cx="300" cy="100" r="46" fill="none" stroke="url(#sparkGrad)" stroke-width="1" stroke-dasharray="3 4"/>
    <circle cx="300" cy="100" r="60" fill="none" stroke="url(#sparkGrad)" stroke-width="0.5" stroke-dasharray="1 6" opacity="0.5"/>
  </g>

  <!-- Lightning bolt (yellow, glowing) -->
  <g filter="url(#glowYellow)">
    <path d="M 308 56 L 282 102 L 298 102 L 290 148 L 318 96 L 302 96 L 312 56 Z"
          fill="#ffe14d" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- AIRENA wordmark -->
  <g filter="url(#glowText)">
    <text x="300" y="186" text-anchor="middle"
          font-family="'Orbitron', 'Arial Black', sans-serif"
          font-size="24" font-weight="900"
          letter-spacing="6"
          fill="url(#textGrad)">AIRENA</text>
  </g>

  <!-- Decorative scan lines under text -->
  <line x1="240" y1="195" x2="360" y2="195" stroke="url(#textGrad)" stroke-width="1" opacity="0.6"/>

  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ff2d78"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#ff2d78"/>
    </linearGradient>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowText" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>

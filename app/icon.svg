<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded black base — gives the favicon a defined silhouette in browser tabs -->
  <rect width="64" height="64" rx="10" fill="#050505"/>

  <!-- Red corner brackets at top-left and bottom-right.
       3px stroke (vs the navbar icon's 2.5px) so they stay visible
       when the favicon is rasterized at 16-32px. -->
  <path d="M 6 6 H 22 M 6 6 V 22"   stroke="#FF003A" stroke-width="3" stroke-linecap="square"/>
  <path d="M 58 58 H 42 M 58 58 V 42" stroke="#FF003A" stroke-width="3" stroke-linecap="square"/>

  <!-- White "A" letterform — same heavy condensed wedge with crossbar
       used in /logo-icon.svg, anchored slightly lower to clear the
       rounded top corner. -->
  <path fill="#FFFFFF" fill-rule="evenodd" d="
    M 32 12 L 54 56 L 42 56 L 38.5 46 L 25.5 46 L 22 56 L 10 56 Z
    M 32 26 L 36.5 38 L 27.5 38 Z
  "/>
</svg>
